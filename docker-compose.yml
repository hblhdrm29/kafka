services:
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: transactions_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka-broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:9094'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:9092,INTERNAL://kafka:9094'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafdrop:
    image: obsidiandynamics/kafdrop
    container_name: kafka-ui
    ports:
      - "9000:9000"
    environment:
      - KAFKA_BROKERCONNECT=kafka:9094
    depends_on:
      - kafka

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-api
    command: ["./api"]
    ports:
      - "8080:8080"
    environment:
      - DB_DSN=root:rootpassword@tcp(mysql:3306)/transactions_db?parseTime=true
      - KAFKA_BROKER=kafka:9094
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started

  ws:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-ws
    command: ["./ws"]
    ports:
      - "8086:8086"
    environment:
      - KAFKA_BROKER=kafka:9094
      - WS_PORT=8086
    depends_on:
      kafka:
        condition: service_started

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-worker
    command: ["./worker"]
    environment:
      - DB_DSN=root:rootpassword@tcp(mysql:3306)/transactions_db?parseTime=true
      - KAFKA_BROKER=kafka:9094
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started

  consumer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-consumer
    command: ["./consumer"]
    environment:
      - DB_DSN=root:rootpassword@tcp(mysql:3306)/transactions_db?parseTime=true
      - KAFKA_BROKER=kafka:9094
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - ws
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  mysql_data:
  kafka_data:
